<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: 'CuteFont';
  src: url('file://{{fontDir}}/可爱字体.ttf') format('truetype');
}
@font-face {
  font-family: 'EmojiFont';
  src: url('file://{{fontDir}}/NotoColorEmoji.ttf') format('truetype');
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'CuteFont', sans-serif;
  background: {{bgColor}};
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  border: 6px solid {{borderColor}};
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 16px;
  max-width: 600px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  flex-shrink: 0;
  overflow: hidden;
  border: 3px solid {{borderColor}};
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.info {
  flex: 1;
  min-width: 0;
}
.info-line {
  font-size: 15px;
  color: {{textColor}};
  line-height: 1.8;
  word-break: break-all;
}
.info-line .label {
  color: {{labelColor}};
}
</style>
</head>
<body>
<div class="card">
  <div class="avatar">
    <img src="{{avatarUrl}}" alt="avatar" onerror="this.style.display='none'">
  </div>
  <div class="info">
    {{each display}}
    <div class="info-line">{{$value}}</div>
    {{/each}}
  </div>
</div>
</body>
</html>
